<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Internship Archive</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Noe Schaerer</p>
        <h1>Internship Archive</h1>
      </div>
      <a class="repo-link" href="README.md">README</a>
    </header>

    <main class="layout">
      <aside class="navigator" aria-label="Archive files">
        <div class="navigator-title">
          <span>Structure</span>
          <span id="file-count">0 files</span>
        </div>
        <div id="tree" class="tree"></div>
      </aside>

      <section class="viewer" aria-live="polite">
        <div class="viewer-header">
          <div>
            <p id="file-kind" class="eyebrow">Select a file</p>
            <h2 id="file-title">Choose a PDF or code file</h2>
            <p id="file-path">The directory tree matches the two source folders.</p>
          </div>
          <a id="open-raw" class="raw-link" href="#" target="_blank" rel="noreferrer">Open raw</a>
        </div>

        <div id="pdf-panel" class="pdf-panel" hidden>
          <iframe id="pdf-frame" title="PDF preview"></iframe>
        </div>

        <div id="code-panel" class="code-panel" hidden>
          <pre><code id="code-output"></code></pre>
        </div>

        <div id="notebook-panel" class="notebook-panel" hidden></div>

        <div id="empty-panel" class="empty-panel">
          <h2>Simple GitHub-ready file visualization</h2>
          <p>Browse the internship reports, Python scripts, and notebook from one static page.</p>
        </div>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
