<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PDF Visualizer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>PDF Visualizer</h1>
        <p>Open a PDF, render pages, and inspect it visually.</p>
      </div>
      <label class="file-button">
        <input id="file-input" type="file" accept="application/pdf">
        Open PDF
      </label>
    </header>

    <main class="workspace">
      <aside class="sidebar" aria-label="PDF information and pages">
        <section class="drop-zone" id="drop-zone">
          <strong>Drop PDF here</strong>
          <span>or use the open button</span>
        </section>

        <section class="info-panel">
          <h2>Document</h2>
          <dl>
            <div>
              <dt>Name</dt>
              <dd id="doc-name">No file selected</dd>
            </div>
            <div>
              <dt>Pages</dt>
              <dd id="doc-pages">-</dd>
            </div>
            <div>
              <dt>Size</dt>
              <dd id="doc-size">-</dd>
            </div>
          </dl>
        </section>

        <section class="thumbnail-panel">
          <h2>Pages</h2>
          <div id="thumbnails" class="thumbnails" aria-label="Page thumbnails"></div>
        </section>
      </aside>

      <section class="viewer-shell">
        <div class="toolbar" aria-label="PDF controls">
          <button id="prev-page" type="button" title="Previous page" aria-label="Previous page">‹</button>
          <div class="page-readout">
            <input id="page-number" type="number" min="1" value="1" aria-label="Page number">
            <span>/</span>
            <span id="page-count">-</span>
          </div>
          <button id="next-page" type="button" title="Next page" aria-label="Next page">›</button>
          <span class="toolbar-divider"></span>
          <button id="zoom-out" type="button" title="Zoom out" aria-label="Zoom out">−</button>
          <span id="zoom-level" class="zoom-level">100%</span>
          <button id="zoom-in" type="button" title="Zoom in" aria-label="Zoom in">+</button>
          <button id="fit-width" type="button">Fit width</button>
          <button id="rotate" type="button">Rotate</button>
        </div>

        <div class="canvas-stage" id="canvas-stage">
          <div class="empty-state" id="empty-state">
            <h2>Open a PDF to begin</h2>
            <p>The selected page will render here with zoom, rotate, fit-width, and page navigation.</p>
          </div>
          <canvas id="pdf-canvas" aria-label="Rendered PDF page"></canvas>
        </div>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
